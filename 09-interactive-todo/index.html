<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <script src="https://kit.fontawesome.com/f911defdbe.js" crossorigin="anonymous"></script>
   <link rel="stylesheet" href="styles.css">
   <title>Interactive ToDo</title>
</head>
<body>
   
   <div class="container">

      <h1>My <span class="highlight">Tasks</span></h1>
      <div class="task-container">
         <input type="text" id="task-input" placeholder="Enter a new task">
         <button id="add-task-btn">Add Task</button>
      </div>

      <p>Total Task: <span id="task-count">0</span></p>

      <ul id="task-list">
         <!-- dynamically add task -->
      </ul>

   </div>

   <script src="script.js"></script>
</body>
</html>
